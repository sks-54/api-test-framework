name: CI

on:
  push:
    branches-ignore: ["main"]
    # Temporary resource optimization: skip CI on feature-branch commits that
    # only touch documentation. PRs always run full CI regardless of which files
    # changed (see pull_request trigger below — no paths-ignore there by design).
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "specs/**"
      - "ENHANCEMENTS.md"
      - "DELIVERABLES.md"
      - "CLAUDE_LOG.md"
      - "BUG_REPORT.md"
      - "TEST_PLAN.md"
  pull_request:
    branches: ["**"]
    # No paths-ignore here — CI always runs on every PR regardless of which
    # files changed. The paths-ignore on the push trigger above is a temporary
    # resource optimization for feature-branch commits only.

# Cancel in-progress runs on the same branch regardless of which event fired.
# github.head_ref = branch name for pull_request events (e.g. "phase/3-tests")
# github.ref_name = branch name for push events (e.g. "phase/3-tests")
# Both resolve to the same string, so push + PR-sync on the same branch share
# one concurrency slot and the older run is cancelled automatically.
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  # ── Stage 1: Smoke (ubuntu / 3.11) ───────────────────────────────────────────
  # Cheapest fast-fail: import errors, broken fixtures, both API environments.
  # ubuntu is the cheapest runner; 3.11 is the stable reference version.
  smoke:
    name: Smoke (ubuntu / 3.11)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Set up Python 3.11
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v5.0.5
        with:
          path: ~/.cache/pip
          key: pip-ubuntu-3.11-${{ hashFiles('pyproject.toml', 'requirements.txt') }}
          restore-keys: pip-ubuntu-3.11-

      - name: Install dependencies
        run: pip install --upgrade pip && pip install -e ".[test]"

      - name: Collect tests (import + discovery check)
        shell: bash
        run: |
          set -o pipefail
          pytest --collect-only -q 2>&1 | tee collect.log || code=$?
          if [ "${code:-0}" -eq 5 ]; then
            echo "⚠️  No tests collected yet — skipping run (early phase)"
            exit 0
          fi
          exit "${code:-0}"

      - name: Run tests — countries
        shell: bash
        run: |
          set -o pipefail
          pytest --env countries -v --alluredir=allure-results --tb=short \
            -p no:cacheprovider 2>&1 | tee test-countries.log || code=$?
          if [ "${code:-0}" -eq 5 ]; then echo "No tests collected"; exit 0; fi
          echo "### Countries Test Summary" >> "$GITHUB_STEP_SUMMARY"
          tail -20 test-countries.log >> "$GITHUB_STEP_SUMMARY"
          exit "${code:-0}"

      - name: Run tests — weather
        shell: bash
        run: |
          set -o pipefail
          pytest --env weather -v --alluredir=allure-results --tb=short \
            -p no:cacheprovider 2>&1 | tee test-weather.log || code=$?
          if [ "${code:-0}" -eq 5 ]; then echo "No tests collected"; exit 0; fi
          echo "### Weather Test Summary" >> "$GITHUB_STEP_SUMMARY"
          tail -20 test-weather.log >> "$GITHUB_STEP_SUMMARY"
          exit "${code:-0}"

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: allure-results-smoke
          path: allure-results/
          retention-days: 7

  # ── Stage 2: Platform check (windows + mac, 3.11 only) ───────────────────────
  # Validates OS-specific behaviour: path separators, encoding, tempfile locations.
  # 3.11 is sufficient — OS bugs don't change with Python minor version.
  # Only runs if smoke passes (fail-fast before spending platform runner budget).
  platform:
    name: Platform (${{ matrix.os }} / 3.11)
    needs: smoke
    if: success()
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        os: [windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Set up Python 3.11
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v5.0.5
        with:
          path: |
            ~/.cache/pip
            ~/AppData/Local/pip/Cache
          key: pip-${{ runner.os }}-3.11-${{ hashFiles('pyproject.toml', 'requirements.txt') }}
          restore-keys: pip-${{ runner.os }}-3.11-

      - name: Install dependencies
        run: pip install --upgrade pip && pip install -e ".[test]"

      - name: Run full test suite
        shell: bash
        run: |
          set -o pipefail
          pytest -v --tb=short -p no:cacheprovider 2>&1 | tee test-output.log || code=$?
          if [ "${code:-0}" -eq 5 ]; then echo "No tests collected"; exit 0; fi
          tail -20 test-output.log
          exit "${code:-0}"

  # ── Stage 3: Version boundaries (ubuntu, 3.9 + 3.12 only) ───────────────────
  # Validates Python version compatibility at the support boundary.
  # Rationale: OS compat is already proven by stages 1+2. Python version bugs
  # (deprecated syntax, stdlib changes, type-hint behaviour) are OS-independent.
  # Testing 3.9 (oldest supported) and 3.12 (newest) covers the full range —
  # intermediate versions (3.10) add no meaningful signal and double the cost.
  # ubuntu is used (cheapest runner) since OS-specific behaviour is not the concern here.
  versions:
    name: Versions (ubuntu / ${{ matrix.python-version }})
    needs: platform
    if: success()
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        python-version: ["3.9", "3.12"]

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v5.0.5
        with:
          path: ~/.cache/pip
          key: pip-ubuntu-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml', 'requirements.txt') }}
          restore-keys: pip-ubuntu-${{ matrix.python-version }}-

      - name: Install dependencies
        run: pip install --upgrade pip && pip install -e ".[test]"

      - name: Run full test suite
        shell: bash
        run: |
          set -o pipefail
          pytest -v --tb=short -p no:cacheprovider 2>&1 | tee test-output.log || code=$?
          if [ "${code:-0}" -eq 5 ]; then echo "No tests collected"; exit 0; fi
          tail -20 test-output.log
          exit "${code:-0}"

  # ── Stage 4: Quality gate ─────────────────────────────────────────────────────
  # Blocks merge if any upstream stage failed.
  # Total runner-jobs per push: 1 (smoke) + 2 (platform) + 2 (versions) + 1 (gate) = 6
  gate:
    name: Quality Gate
    needs: [smoke, platform, versions]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Evaluate results
        shell: bash
        run: |
          smoke="${{ needs.smoke.result }}"
          platform="${{ needs.platform.result }}"
          versions="${{ needs.versions.result }}"
          echo "Smoke: $smoke | Platform: $platform | Versions: $versions"
          if [[ "$smoke" != "success" || "$platform" != "success" || "$versions" != "success" ]]; then
            echo "❌ Quality gate FAILED"
            exit 1
          fi
          echo "✅ Quality gate PASSED — 6 jobs, 3 stages"
