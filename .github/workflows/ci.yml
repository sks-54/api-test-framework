name: CI

on:
  push:
    branches-ignore: ["main"]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "specs/**"
      - "ENHANCEMENTS.md"
      - "DELIVERABLES.md"
      - "CLAUDE_LOG.md"
      - "BUG_REPORT.md"
      - "TEST_PLAN.md"
  pull_request:
    branches: ["**"]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "specs/**"

# Cancel in-progress runs on same branch/PR to avoid wasted spend
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Stage 1: Smoke (ubuntu-latest + Python 3.11 only) ────────────────────────
  # Cheapest possible signal. Catches import errors and broken fixtures fast.
  smoke:
    name: Smoke (ubuntu / 3.11)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Python 3.11
        uses: actions/setup-python@v5.5.0
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4.2.3
        with:
          path: ~/.cache/pip
          key: pip-ubuntu-3.11-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-ubuntu-3.11-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Collect tests (discovery + import check)
        shell: bash
        run: |
          set -o pipefail
          pytest --collect-only -q 2>&1 | tee collect.log || code=$?
          if [ "${code:-0}" -eq 5 ]; then
            echo "⚠️  No tests collected yet — skipping run (early phase)"
            exit 0
          fi
          exit "${code:-0}"

      - name: Run tests — countries
        shell: bash
        run: |
          set -o pipefail
          pytest --env countries -v --alluredir=allure-results --tb=short \
            -p no:cacheprovider 2>&1 | tee test-countries.log || code=$?
          if [ "${code:-0}" -eq 5 ]; then echo "No tests collected"; exit 0; fi
          echo "### Countries Test Summary" >> "$GITHUB_STEP_SUMMARY"
          tail -20 test-countries.log >> "$GITHUB_STEP_SUMMARY"
          exit "${code:-0}"

      - name: Run tests — weather
        shell: bash
        run: |
          set -o pipefail
          pytest --env weather -v --alluredir=allure-results --tb=short \
            -p no:cacheprovider 2>&1 | tee test-weather.log || code=$?
          if [ "${code:-0}" -eq 5 ]; then echo "No tests collected"; exit 0; fi
          echo "### Weather Test Summary" >> "$GITHUB_STEP_SUMMARY"
          tail -20 test-weather.log >> "$GITHUB_STEP_SUMMARY"
          exit "${code:-0}"

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: allure-results-ubuntu-311
          path: allure-results/
          retention-days: 7

  # ── Stage 2: Cross-platform check (one windows + one mac, 3.11 only) ─────────
  # Validates platform compatibility before burning the full matrix budget.
  platform:
    name: Platform check (${{ matrix.os }} / 3.11)
    needs: smoke
    if: success()
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        os: [windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Python 3.11
        uses: actions/setup-python@v5.5.0
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4.2.3
        with:
          path: |
            ~/.cache/pip
            ~/AppData/Local/pip/Cache
          key: pip-${{ runner.os }}-3.11-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-${{ runner.os }}-3.11-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run full test suite
        shell: bash
        run: |
          set -o pipefail
          pytest -v --tb=short -p no:cacheprovider 2>&1 | tee test-output.log || code=$?
          if [ "${code:-0}" -eq 5 ]; then echo "No tests collected"; exit 0; fi
          tail -20 test-output.log
          exit "${code:-0}"

  # ── Stage 3: Full version matrix (all OS × Python 3.9–3.12) ─────────────────
  # Runs only after both smoke AND platform checks pass.
  # Excludes combos already covered by smoke (ubuntu/3.11) and platform (*/3.11).
  matrix:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }}
    needs: platform
    if: success()
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.9", "3.10", "3.12"]

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5.5.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4.2.3
        with:
          path: |
            ~/.cache/pip
            ~/AppData/Local/pip/Cache
          key: pip-${{ runner.os }}-${{ matrix.python-version }}-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-${{ runner.os }}-${{ matrix.python-version }}-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run full test suite
        shell: bash
        run: |
          set -o pipefail
          pytest -v --tb=short -p no:cacheprovider 2>&1 | tee test-output.log || code=$?
          if [ "${code:-0}" -eq 5 ]; then echo "No tests collected"; exit 0; fi
          tail -20 test-output.log
          exit "${code:-0}"

  # ── Stage 4: Quality gate — blocks merge if any stage failed ─────────────────
  gate:
    name: Quality Gate
    needs: [smoke, platform, matrix]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Evaluate results
        shell: bash
        run: |
          smoke="${{ needs.smoke.result }}"
          platform="${{ needs.platform.result }}"
          matrix="${{ needs.matrix.result }}"
          echo "Smoke: $smoke | Platform: $platform | Matrix: $matrix"
          if [[ "$smoke" != "success" || "$platform" != "success" || "$matrix" != "success" ]]; then
            echo "❌ Quality gate FAILED"
            exit 1
          fi
          echo "✅ Quality gate PASSED"
