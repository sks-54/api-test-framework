countries:
  base_url: https://restcountries.com/v3.1
  probe_path: /name/germany
  security:
    injection_path: /name/{payload}
    known_violations:
    - bug_id: BUG-007
      issue: https://github.com/sks-54/api-test-framework/issues/15
      reason: restcountries.com missing HSTS, X-Content-Type-Options, X-Frame-Options
      type: security_headers
    probe_params: {}
    probe_path: /name/germany
  thresholds:
    max_response_time: 2.0
    min_results_count: 1
version: '1.0'
weather:
  base_url: https://api.open-meteo.com/v1
  probe_path: /forecast?latitude=52.52&longitude=13.41&hourly=temperature_2m
  security:
    injection_path: /forecast?latitude={payload}&longitude=13.41&hourly=temperature_2m
    known_violations:
    - bug_id: BUG-006
      issue: https://github.com/sks-54/api-test-framework/issues/14
      method: POST
      reason: POST /forecast returns 415 instead of 405 (RFC 7231 SS6.5.5 violation)
      type: method
    - bug_id: BUG-009
      issue: https://github.com/sks-54/api-test-framework/issues/18
      method: DELETE
      reason: DELETE /forecast returns 404 instead of 405 (RFC 7231 SS6.5.5 violation)
      type: method
    - bug_id: BUG-011
      issue: https://github.com/sks-54/api-test-framework/issues/21
      method: PUT
      reason: PUT /forecast returns 404 instead of 405 (RFC 7231 SS6.5.5 violation)
      type: method
    - bug_id: BUG-012
      issue: https://github.com/sks-54/api-test-framework/issues/22
      method: PATCH
      reason: PATCH /forecast returns 404 instead of 405 (RFC 7231 SS6.5.5 violation)
      type: method
    - bug_id: BUG-010
      issue: https://github.com/sks-54/api-test-framework/issues/19
      reason: GET /forecast ignores Accept application/xml returns 200 JSON instead
        of 406
      type: content_negotiation
    - bug_id: BUG-008
      issue: https://github.com/sks-54/api-test-framework/issues/16
      reason: api.open-meteo.com missing HSTS, X-Content-Type-Options, X-Frame-Options
      type: security_headers
    - bug_id: BUG-004
      issue: https://github.com/sks-54/api-test-framework/issues/8
      reason: Open-Meteo /forecast consistently times out from CI runner IPs - SLA
        violation
      type: performance_sla
    probe_params:
      hourly: temperature_2m
      latitude: 52.52
      longitude: 13.41
    probe_path: /forecast
  thresholds:
    max_response_time: 3.0
    min_results_count: 1
