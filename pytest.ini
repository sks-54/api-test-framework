[pytest]
addopts = -v --tb=short
markers =
    countries: tests targeting the REST Countries API environment
    weather: tests targeting the Open-Meteo weather API environment
    boundary: boundary value analysis test cases
    equivalence: equivalence partitioning test cases
    negative: negative / error-path test cases
    performance: response-time threshold assertions
    reliability: retry and fault-tolerance test cases
    security: security property assertions
    compatibility: platform and Python-version compatibility assertions
    baseline: baseline health checks (HTTPS, 2xx, 404, performance) across all environments
